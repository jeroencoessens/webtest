<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Safari Friends">
    <title>Safari Friends - Collect Animals!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Game World -->
        <div class="game-world">
            <div class="world-viewport" id="worldViewport">
                <!-- Game elements rendered here -->
            </div>
        </div>

        <!-- Joystick -->
        <div class="joystick-container" id="joystickContainer">
            <div class="joystick-bg" id="joystickBg">
                <div class="joystick-stick" id="joystickStick"></div>
            </div>
        </div>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            <!-- Score Display -->
            <div class="score-display">
                <div class="score-item">
                    <span class="score-label">Animals:</span>
                    <span class="score-value" id="animalCount">0/6</span>
                </div>
                <div class="score-item">
                    <span class="score-label">Score:</span>
                    <span class="score-value" id="scoreDisplay">0</span>
                </div>
            </div>

            <!-- Collected Animals -->
            <div class="collected-animals">
                <div class="collection-title">🦁 Collection</div>
                <div class="animal-slot" id="slot0"></div>
                <div class="animal-slot" id="slot1"></div>
                <div class="animal-slot" id="slot2"></div>
                <div class="animal-slot" id="slot3"></div>
                <div class="animal-slot" id="slot4"></div>
                <div class="animal-slot" id="slot5"></div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-content">
                <div class="game-over-title">🎉 Safari Complete!</div>
                <div class="game-over-text">You've collected 6 amazing animals!</div>
                <div class="final-score-container">
                    <div class="final-score-label">Final Score:</div>
                    <div class="final-score" id="finalScore">0</div>
                </div>
                <div class="collection-summary" id="collectionSummary"></div>
                <button class="play-again-btn" id="playAgainBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
